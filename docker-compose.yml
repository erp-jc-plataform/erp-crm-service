# ============================================================
# BusinessApp ERP — Docker Compose Global
# Levanta toda la infraestructura con: docker-compose up -d
# ============================================================

version: '3.8'

networks:
  erp-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  postgres_data:
  elasticsearch_data:
  clickhouse_data:
  timescale_data:
  kafka_data:
  zookeeper_data:

# ============================================================
# INFRAESTRUCTURA COMPARTIDA
# ============================================================
services:

  # ----------------------------------------------------------
  # MongoDB — usado por: Log, Mensajeria, Notificaciones, Report
  # ----------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: erp-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: erp
    networks:
      - erp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Redis — usado por: Gateway, Mensajeria, Notificaciones, Report
  # ----------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: erp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - erp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # PostgreSQL — usado por: Security, Licensing
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_password}
      POSTGRES_DB: ${POSTGRES_DB:-erp_db}
    networks:
      - erp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Zookeeper — requerido por Kafka
  # ----------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: erp-zookeeper
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - erp-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Kafka — usado por: Log, Notificaciones, Report, Mensajeria
  # ----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: erp-kafka
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - erp-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Elasticsearch — usado por: Log
  # ----------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: erp-elasticsearch
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    networks:
      - erp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ----------------------------------------------------------
  # ClickHouse — usado por: Report (analitica big data)
  # ----------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: erp-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - erp-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # TimescaleDB — usado por: Report (series de tiempo)
  # ----------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: erp-timescaledb
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${TIMESCALE_USER:-erp_user}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-erp_password}
      POSTGRES_DB: ${TIMESCALE_DB:-erp_metrics}
    networks:
      - erp-network
    restart: unless-stopped

# ============================================================
# MICROSERVICIOS
# ============================================================

  # ----------------------------------------------------------
  # Gateway — puerto 4000
  # ----------------------------------------------------------
  erp-gateway:
    build:
      context: ./Business-Gateway
      dockerfile: Dockerfile
    container_name: erp-gateway-service
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      SECURITY_SERVICE_URL: http://erp-security:8000
      LICENSING_SERVICE_URL: http://erp-licensing:3001
      CRM_SERVICE_URL: http://erp-crm:8003
      MENSAJERIA_SERVICE_URL: http://erp-mensajeria:3006
      NOTIFICACIONES_SERVICE_URL: http://erp-notificaciones:3007
      REPORT_SERVICE_URL: http://erp-report:3008
      LOG_SERVICE_URL: http://erp-log:3005
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
    depends_on:
      - redis
      - erp-security
    networks:
      - erp-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Security — puerto 8000
  # ----------------------------------------------------------
  erp-security:
    build:
      context: ./Business-Security
      dockerfile: Dockerfile
    container_name: erp-security-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_password}@postgres:5432/${POSTGRES_DB:-erp_db}
      SECRET_KEY: ${JWT_SECRET:-change-this-secret}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Licensing — puerto 3001
  # ----------------------------------------------------------
  erp-licensing:
    build:
      context: ./Business-Licensing
      dockerfile: Dockerfile
    container_name: erp-licensing-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_password}@postgres:5432/erp_licensing
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Mensajeria — puerto 3006
  # ----------------------------------------------------------
  erp-mensajeria:
    build:
      context: ./Business-Mensajeria
      dockerfile: Dockerfile
    container_name: erp-mensajeria-service
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/erp_mensajeria
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - erp-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Notificaciones — puerto 3007
  # ----------------------------------------------------------
  erp-notificaciones:
    build:
      context: ./Business-Notificaciones
      dockerfile: Dockerfile
    container_name: erp-notificaciones-service
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/erp_notificaciones
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@businessapp.com}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - erp-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Report — puerto 3008
  # ----------------------------------------------------------
  erp-report:
    build:
      context: ./Business-Report
      dockerfile: Dockerfile
    container_name: erp-report-service
    ports:
      - "3008:3008"
    environment:
      PORT: 3008
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/erp_reports
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      CLICKHOUSE_HOST: http://clickhouse:8123
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_USER: ${TIMESCALE_USER:-erp_user}
      TIMESCALE_PASSWORD: ${TIMESCALE_PASSWORD:-erp_password}
      TIMESCALE_DB: ${TIMESCALE_DB:-erp_metrics}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      STORAGE_PATH: /app/storage/reports
    volumes:
      - ./Business-Report/storage:/app/storage
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started
    networks:
      - erp-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Log — puerto 3005
  # ----------------------------------------------------------
  erp-log:
    build:
      context: ./Business-Log
      dockerfile: Dockerfile
    container_name: erp-log-service
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/erp_logs
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      KAFKA_BROKERS: kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - erp-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # CRM — puerto 8003 (.NET 8 + PostgreSQL)
  # ----------------------------------------------------------
  erp-crm:
    build:
      context: ./Business-CRM/erp-crm-service-net8
      dockerfile: Dockerfile
    container_name: erp-crm-service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: Host=postgres;Port=5432;Database=${POSTGRES_DB:-erp_db};Username=${POSTGRES_USER:-erp_user};Password=${POSTGRES_PASSWORD:-erp_password}
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-network
    restart: unless-stopped
